services:
  api-hub:
    image: api-hub:latest
    container_name: api-hub
    restart: unless-stopped
    ports:
      - "3127:3127"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3127
      - DATA_DIR=/app/data
      - PANEL_PASSWORD=change-me
      - SESSION_SECRET=change-this-random-long-secret
      - LOGIN_MAX_ATTEMPTS=5
      - LOGIN_LOCK_MINUTES=10
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3127/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
